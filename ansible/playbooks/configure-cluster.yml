---
- name: Configure EKS Cluster Post-Deployment
  hosts: [IP_ADDRESS]
  connection: local
  gather_facts: false

  vars:
    cluster_name: "{{ lookup('env', 'CLUSTER_NAME') | default('apache-eks-cluster') }}"
    aws_region: "{{ lookup('env', 'AWS_REGION') | default('us-west-2') }}"
    env_name: "{{ lookup('env', 'ENVIRONMENT') | default('dev') }}"

  tasks:
    - name: Update kubeconfig
      ansible.builtin.command:
        cmd: "aws eks update-kubeconfig --name {{ cluster_name }} --region {{ aws_region }}"
      changed_when: true

    - name: Verify cluster connectivity
      ansible.builtin.command:
        cmd: "kubectl get nodes"
      register: nodes_output
      changed_when: false

    - name: Display cluster nodes
      ansible.builtin.debug:
        var: nodes_output.stdout_lines

    - name: Create application namespace
      ansible.builtin.shell:
        cmd: "set -o pipefail && kubectl create namespace apache-app --dry-run=client -o yaml | kubectl apply -f -"
        executable: /bin/bash
      changed_when: true

    - name: Label the namespace
      ansible.builtin.command:
        cmd: "kubectl label namespace apache-app app=apache-web environment={{ env_name }} --overwrite"
      changed_when: true

    - name: Verify namespace creation
      ansible.builtin.command:
        cmd: "kubectl get namespace apache-app"
      register: ns_output
      changed_when: false

    - name: Display namespace info
      ansible.builtin.debug:
        var: ns_output.stdout_lines

