  name: Deploy Apache Web Server via Helm
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    cluster_name: "{{ lookup('env', 'CLUSTER_NAME') | default('apache-eks-cluster') }}"
    aws_region: "{{ lookup('env', 'AWS_REGION') | default('us-west-2') }}"
    image_repository: "{{ lookup('env', 'IMAGE_REPOSITORY') }}"
    image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest') }}"
    helm_release_name: "apache-web"
    helm_chart_path: "helm/apache-chart"
    app_namespace: "apache-app"

  tasks:
    - name: Update kubeconfig
      ansible.builtin.command:
        cmd: >-
          aws eks update-kubeconfig
          --name {{ cluster_name }}
          --region {{ aws_region }}
      changed_when: true

    - name: Deploy Apache using Helm chart
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install
          {{ helm_release_name }}
          {{ helm_chart_path }}
          --namespace {{ app_namespace }}
          --create-namespace
          --set image.repository={{ image_repository }}
          --set image.tag={{ image_tag }}
          --wait
          --timeout 300s
      changed_when: true

    - name: Wait for pods to be ready
      ansible.builtin.command:
        cmd: >-
          kubectl wait --for=condition=ready pod
          -l app.kubernetes.io/name=apache-web
          -n {{ app_namespace }}
          --timeout=120s
      changed_when: false
      register: wait_result
      ignore_errors: true

    - name: Verify deployment
      ansible.builtin.command:
        cmd: "kubectl get pods -n {{ app_namespace }} -o wide"
      register: pods_output
      changed_when: false

    - name: Display running pods
      ansible.builtin.debug:
        var: pods_output.stdout_lines

    - name: Wait for Load Balancer to provision
      ansible.builtin.command:
        cmd: >-
          kubectl get svc {{ helm_release_name }}-apache-web
          -n {{ app_namespace }}
          -o jsonpath={.status.loadBalancer.ingress[0].hostname}
      register: lb_url
      changed_when: false
      retries: 10
      delay: 30
      until: lb_url.stdout != ""
      ignore_errors: true

    - name: Display application URL
      ansible.builtin.debug:
        msg: "Application is accessible at: http://{{ lb_url.stdout }}"
      when: lb_url.stdout != ""

    - name: Load Balancer not ready yet
      ansible.builtin.debug:
        msg: >-
          Load Balancer is still provisioning.
          Run 'kubectl get svc -n apache-app' to check status later.
      when: lb_url.stdout == ""
