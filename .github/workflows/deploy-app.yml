name: Deploy Application

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'

env:
  AWS_REGION: us-west-2
  CLUSTER_NAME: apache-eks-cluster
  ECR_REPOSITORY: apache-web

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Deploy with Ansible + Helm
        id: deploy
        env:
          CLUSTER_NAME: ${{ env.CLUSTER_NAME }}
          AWS_REGION: ${{ env.AWS_REGION }}
          IMAGE_REPOSITORY: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
        run: |
          ansible-playbook ansible/playbooks/deploy-app.yml

      - name: Get deployment info
        id: info
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION
          LB_URL=$(kubectl get svc -n apache-app -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          POD_COUNT=$(kubectl get pods -n apache-app --no-headers 2>/dev/null | wc -l || echo "0")
          HELM_REVISION=$(helm list -n apache-app --short 2>/dev/null || echo "unknown")
          echo "lb_url=$LB_URL" >> $GITHUB_OUTPUT
          echo "pod_count=$POD_COUNT" >> $GITHUB_OUTPUT
          echo "helm_revision=$HELM_REVISION" >> $GITHUB_OUTPUT

      - name: Set commit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Deployed to EKS successfully',
              context: 'deployment/eks'
            });

      - name: Comment on associated PR
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha
            });

            const body = `## 🚀 Deployment Successful!

            | Detail | Value |
            |--------|-------|
            | **Status** | ✅ Deployed |
            | **Image Tag** | \`${sha.substring(0, 7)}\` |
            | **Pods Running** | ${{ steps.info.outputs.pod_count }} |
            | **Load Balancer** | ${{ steps.info.outputs.lb_url }} |
            | **Namespace** | apache-app |
            | **Cluster** | apache-eks-cluster |
            | **Workflow Run** | [View Logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |

            ---
            *Deployed via GitHub Actions at ${new Date().toISOString()}*`;

            for (const pr of prs) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: body
              });
            }

      - name: Verify deployment
        run: |
          kubectl rollout status deployment -n apache-app --timeout=300s || true
          echo "---"
          echo "Services:"
          kubectl get svc -n apache-app
