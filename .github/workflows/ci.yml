name: CI - Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: apache-web
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        id: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
        continue-on-error: true

      - name: Lint Helm Chart
        id: helm-lint
        run: |
          helm lint helm/apache-chart/ 2>&1 | tee helm-lint-output.txt
          echo "result=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.0

      - name: Validate Terraform
        id: terraform
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate 2>&1 | tee tf-validate-output.txt
          terraform fmt -check 2>&1 | tee tf-fmt-output.txt
        continue-on-error: true

      - name: Lint Ansible Playbooks
        id: ansible-lint
        run: |
          pip install ansible-lint
          ansible-lint ansible/playbooks/*.yml 2>&1 | tee ansible-lint-output.txt
        continue-on-error: true

      - name: Post CI results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const hadolint = '${{ steps.hadolint.outcome }}';
            const helm = '${{ steps.helm-lint.outcome }}';
            const terraform = '${{ steps.terraform.outcome }}';
            const ansible = '${{ steps.ansible-lint.outcome }}';

            const icon = (status) => status === 'success' ? '✅' : '❌';

            const body = `## 🔍 CI Lint Results

            | Check | Status |
            |-------|--------|
            | Dockerfile (hadolint) | ${icon(hadolint)} ${hadolint} |
            | Helm Chart | ${icon(helm)} ${helm} |
            | Terraform | ${icon(terraform)} ${terraform} |
            | Ansible Playbooks | ${icon(ansible)} ${ansible} |

            ---
            *[View full workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Fail if any lint failed
        run: |
          if [ "${{ steps.hadolint.outcome }}" != "success" ] || \
             [ "${{ steps.helm-lint.outcome }}" != "success" ] || \
             [ "${{ steps.terraform.outcome }}" != "success" ] || \
             [ "${{ steps.ansible-lint.outcome }}" != "success" ]; then
            echo "One or more lint checks failed"
            exit 1
          fi

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f docker/Dockerfile docker/
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -f docker/Dockerfile docker/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}'
          format: 'sarif'
          output: 'trivy-results.sarif'

    outputs:
      image_tag: ${{ env.IMAGE_TAG }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
